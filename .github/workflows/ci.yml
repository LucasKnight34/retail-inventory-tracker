name: CI

on:
  push:
    branches: [main, develop]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: testdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U testuser -d testdb"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: actions/cache@v4
        with:
          path: backend/node_modules
          key: backend-deps-${{ runner.os }}-${{ hashFiles('backend/package-lock.json') }}

      - run: npm install
        working-directory: backend

      - name: Run database schema
        run: psql $TEST_DATABASE_URL -f backend/src/db/schema.sql
        env:
          TEST_DATABASE_URL: postgresql://testuser:testpass@localhost:5432/testdb

      - run: npm test
        working-directory: backend
        env:
          NODE_ENV: test
          JWT_SECRET: test-secret-for-ci
          TEST_DATABASE_URL: postgresql://testuser:testpass@localhost:5432/testdb

  build-frontend:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: actions/cache@v4
        with:
          path: frontend/node_modules
          key: frontend-deps-${{ runner.os }}-${{ hashFiles('frontend/package-lock.json') }}

      - run: npm install
        working-directory: frontend

      - run: npm run build
        working-directory: frontend
